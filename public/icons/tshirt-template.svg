<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="20" fill="#F5F5F0"/>
  <!-- T-Shirt Shape -->
  <path d="M120 100 L160 80 L200 95 L240 80 L280 100 L300 140 L270 150 L260 120 L260 300 L140 300 L140 120 L130 150 L100 140 Z" fill="#FF5733" stroke="#E84E2E" stroke-width="2"/>
  <!-- Collar -->
  <path d="M160 80 Q180 100 200 95 Q220 100 240 80" fill="none" stroke="#E84E2E" stroke-width="2"/>
  <!-- Logo placeholder on chest -->
  <circle cx="200" cy="170" r="25" fill="white" opacity="0.3"/>
  <text x="200" y="175" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">FITRA</text>
  <!-- Race name -->
  <text x="200" y="220" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" opacity="0.8">RACE 2026</text>
  <!-- Template label -->
  <text x="200" y="350" text-anchor="middle" fill="#1A1A1A" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.4">T-Shirt Design Template</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="20" fill="#F5F5F0"/>
  <!-- Ribbon -->
  <path d="M175 50 L175 160 L200 140 L225 160 L225 50" fill="#FF5733" stroke="#E84E2E" stroke-width="1.5"/>
  <!-- Medal circle outer ring -->
  <circle cx="200" cy="230" r="90" fill="#FFB800" stroke="#E6A600" stroke-width="3"/>
  <!-- Medal inner ring -->
  <circle cx="200" cy="230" r="75" fill="#FFCC33" stroke="#FFB800" stroke-width="2"/>
  <!-- Inner detail ring -->
  <circle cx="200" cy="230" r="60" fill="none" stroke="#FFB800" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Star -->
  <polygon points="200,180 210,210 240,210 215,228 225,260 200,240 175,260 185,228 160,210 190,210" fill="#FF5733" opacity="0.9"/>
  <!-- Text on medal -->
  <text x="200" y="285" text-anchor="middle" fill="#8B6914" font-family="sans-serif" font-size="11" font-weight="bold">FINISHER</text>
  <!-- Template label -->
  <text x="200" y="370" text-anchor="middle" fill="#1A1A1A" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.4">Medal Design Template</text>
</svg>

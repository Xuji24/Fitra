<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" fill="none">
  <rect width="500" height="350" rx="16" fill="white" stroke="#FF5733" stroke-width="2"/>
  <!-- Border decoration -->
  <rect x="10" y="10" width="480" height="330" rx="12" fill="none" stroke="#FF5733" stroke-width="0.5" stroke-dasharray="6 3"/>
  <!-- Corner accents -->
  <path d="M20 20 L60 20 L20 60 Z" fill="#FF5733" opacity="0.1"/>
  <path d="M480 20 L440 20 L480 60 Z" fill="#FF5733" opacity="0.1"/>
  <path d="M20 330 L60 330 L20 290 Z" fill="#FF5733" opacity="0.1"/>
  <path d="M480 330 L440 330 L480 290 Z" fill="#FF5733" opacity="0.1"/>
  <!-- Header -->
  <text x="250" y="60" text-anchor="middle" fill="#FF5733" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="4">CERTIFICATE OF COMPLETION</text>
  <line x1="150" y1="70" x2="350" y2="70" stroke="#FF5733" stroke-width="1" opacity="0.3"/>
  <!-- Fitra Logo Text -->
  <text x="250" y="100" text-anchor="middle" fill="#FFB800" font-family="sans-serif" font-size="20" font-weight="bold">FITRA</text>
  <!-- Certifies text -->
  <text x="250" y="130" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">This certifies that</text>
  <!-- Name placeholder -->
  <text x="250" y="165" text-anchor="middle" fill="#1A1A1A" font-family="serif" font-size="24" font-weight="bold">[Participant Name]</text>
  <line x1="130" y1="175" x2="370" y2="175" stroke="#1A1A1A" stroke-width="0.5"/>
  <!-- Completion text -->
  <text x="250" y="205" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">has successfully completed the</text>
  <!-- Race name -->
  <text x="250" y="230" text-anchor="middle" fill="#FF5733" font-family="sans-serif" font-size="16" font-weight="bold">[Race Name 2026]</text>
  <!-- Details -->
  <text x="250" y="260" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Finishing Time: [HH:MM:SS] | Distance: [XX] km</text>
  <!-- Signatures -->
  <line x1="80" y1="305" x2="200" y2="305" stroke="#999" stroke-width="0.5"/>
  <text x="140" y="320" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">Race Director</text>
  <line x1="300" y1="305" x2="420" y2="305" stroke="#999" stroke-width="0.5"/>
  <text x="360" y="320" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">Event Organizer</text>
</svg>
